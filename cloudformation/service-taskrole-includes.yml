Policies:
  - PolicyName: SecretsPolicy
    PolicyDocument:
      Statement:
      - Effect: Allow
        Action:
          - 'kms:Decrypt'
          - 'kms:Encrypt'
          - 'kms:ReEncrypt*'
          - 'kms:DescribeKey'
          - 'kms:GenerateDataKey'
          - 'kms:GenerateDataKeyWithoutPlaintext'
          - 'ssm:GetParam*'
          - 'secretsmanager:GetSecretValue'
        Resource:
          - Ref: EnvironmentKmsKey
          - Fn::Sub: 'arn:aws:ssm:*:*:parameter/${EnvironmentName}'
          - Fn::Sub: 'arn:aws:ssm:*:*:parameter/${EnvironmentName}/*'
          - Fn::Sub: 'arn:aws:secretsmanager:*:*:secret:${EnvironmentName}*'
      - Effect: Allow
        Action:
          - 'secretsmanager:ListSecrets'
          - 'elasticfilesystem:DescribeMountTargets'
          - 'ec2:DescribeAvailabilityZones'
          - 'elasticfilesystem:DescribeFileSystems'
        Resource: "*"
  - PolicyName: S3Policy
    PolicyDocument:
      Statement:
      - Effect: Allow
        Action:
          - 's3:Get*'
          - 's3:List*'
          - 's3:PutObject*'
          - 's3-object-lambda:Get*'
          - 's3-object-lambda:List*'
          - 's3-object-lambda:PutObject*'
        Resource:
          - Fn::Sub: 'arn:aws:s3:::${S3AppBucket}'
          - Fn::Sub: 'arn:aws:s3:::${S3AppBucket}/*'
  # Cognito group management — needed by the MDR API to add users to a
  # group when they accept an invite link (#884 Phase 3 PR 2). Same
  # AdminAddUserToGroup action the post-confirmation Lambda already has
  # in cognito-selfserve.yml. Other services that share this task role
  # don't have a use case for it but the action+resource is tightly
  # scoped to a user pool in the same account/region, so the blast
  # radius is bounded.
  - PolicyName: CognitoGroupManagement
    PolicyDocument:
      Statement:
      - Effect: Allow
        Action:
          - 'cognito-idp:AdminAddUserToGroup'
        Resource:
          Fn::Sub: 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*'
