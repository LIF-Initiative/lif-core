AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Cognito User Pool for MDR self-serve registration.
  Creates a User Pool with self-registration enabled, an SPA-compatible OAuth client,
  and a post-confirmation Lambda that assigns each new user to their own Cognito group.

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (dev, demo)
  ServiceName:
    Type: String
    Default: mdr
    Description: Service name prefix for resource naming
  FrontendDomainName:
    Type: String
    Description: Frontend domain for OAuth callback URLs (e.g., mdr.dev.lif.unicon.net)
  LocalDevCallbackUrl:
    Type: String
    Default: http://localhost:5173
    Description: Local dev server URL for OAuth callbacks during development

Resources:

  # ---------------------------------------------------------------------------
  # Cognito User Pool — self-registration enabled
  # ---------------------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${EnvironmentName}-${ServiceName}-selfserve
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: organization
          AttributeDataType: String
          Required: false
          Mutable: true
          StringAttributeConstraints:
            MaxLength: "256"
        - Name: role
          AttributeDataType: String
          Required: false
          Mutable: true
          StringAttributeConstraints:
            MaxLength: "256"
        - Name: reason
          AttributeDataType: String
          Required: false
          Mutable: true
          StringAttributeConstraints:
            MaxLength: "1024"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      LambdaConfig:
        PostConfirmation: !GetAtt PostConfirmationLambda.Arn

  # ---------------------------------------------------------------------------
  # Cognito Domain — Hosted UI
  # ---------------------------------------------------------------------------
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ${EnvironmentName}-${ServiceName}-selfserve
      UserPoolId: !Ref UserPool

  # ---------------------------------------------------------------------------
  # Cognito Client — SPA (public client, PKCE, no secret)
  # ---------------------------------------------------------------------------
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${EnvironmentName}-${ServiceName}-spa
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - !Sub https://${FrontendDomainName}/auth/callback
        - !Sub ${LocalDevCallbackUrl}/auth/callback
      LogoutURLs:
        - !Sub https://${FrontendDomainName}/login
        - !Sub ${LocalDevCallbackUrl}/login
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      IdTokenValidity: 60
      AccessTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  # ---------------------------------------------------------------------------
  # Post-Confirmation Lambda — creates a Cognito group for each new user
  # ---------------------------------------------------------------------------
  PostConfirmationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-${ServiceName}-post-confirm
      Description: >
        Cognito post-confirmation trigger: creates an eval-{username} group,
        adds the confirmed user to it, and calls the MDR API to provision a
        tenant_{group} PostgreSQL schema (issue #883 PR 4b).
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      ReservedConcurrentExecutions: 5
      Role: !GetAtt PostConfirmationLambdaRole.Arn
      Environment:
        Variables:
          MDR_API_URL: !Sub https://${ServiceName}-api.${EnvironmentName}.lif.unicon.net
          MDR_API_KEY_SSM_PARAM: !Sub /${EnvironmentName}/${ServiceName}-post-confirm/MdrApiKey
      Code:
        ZipFile: |
          import json
          import logging
          import os
          import re
          import urllib.error
          import urllib.request

          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          cognito = boto3.client("cognito-idp")
          ssm = boto3.client("ssm")

          MDR_API_URL = os.environ["MDR_API_URL"]
          MDR_API_KEY_SSM_PARAM = os.environ["MDR_API_KEY_SSM_PARAM"]

          # Cache across warm invocations so we read SSM once per container.
          _mdr_api_key = None


          def _get_mdr_api_key():
              global _mdr_api_key
              if _mdr_api_key is None:
                  resp = ssm.get_parameter(Name=MDR_API_KEY_SSM_PARAM, WithDecryption=True)
                  _mdr_api_key = resp["Parameter"]["Value"]
              return _mdr_api_key


          def _provision_tenant(group_name):
              """Call MDR API to create a tenant_{group} schema.

              Failures are logged but not raised — Cognito has already confirmed
              the user and re-raising would put them in an unrecoverable "confirmed
              but unprovisioned" state from the Hosted UI perspective. Ops can
              re-run provisioning manually by invoking the endpoint with the same
              group_name (it's idempotent).
              """
              req = urllib.request.Request(
                  f"{MDR_API_URL}/tenants/provision",
                  data=json.dumps({"group_name": group_name}).encode("utf-8"),
                  headers={
                      "Content-Type": "application/json",
                      "X-API-Key": _get_mdr_api_key(),
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      body = resp.read().decode("utf-8")
                      logger.info(
                          "Tenant provisioned: status=%s group=%s body=%s",
                          resp.status, group_name, body,
                      )
              except urllib.error.HTTPError as e:
                  logger.error(
                      "MDR /tenants/provision returned %s for group %s: %s",
                      e.code, group_name, e.read().decode("utf-8", errors="replace"),
                  )
              except (urllib.error.URLError, TimeoutError) as e:
                  logger.error(
                      "MDR /tenants/provision network error for group %s: %s",
                      group_name, e,
                  )


          def handler(event, context):
              """Cognito PostConfirmation trigger.

              Creates an eval-{username} group, adds the user to it, and
              provisions a tenant schema. Cognito group and tenant provisioning
              failures do not block confirmation.
              """
              user_pool_id = event["userPoolId"]
              username = event["userName"]

              # Sanitize for group name: lowercase, replace non-alphanumeric with hyphens
              safe_name = re.sub(r"[^a-z0-9]", "-", username.lower()).strip("-")[:60]
              group_name = f"eval-{safe_name}"

              try:
                  cognito.create_group(
                      GroupName=group_name,
                      UserPoolId=user_pool_id,
                      Description=f"Auto-created group for {username}",
                  )
              except cognito.exceptions.GroupExistsException:
                  pass  # Idempotent — group already exists

              cognito.admin_add_user_to_group(
                  UserPoolId=user_pool_id,
                  Username=username,
                  GroupName=group_name,
              )

              _provision_tenant(group_name)

              return event

  PostConfirmationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-${ServiceName}-post-confirm-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoGroupManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:CreateGroup
                  - cognito-idp:AdminAddUserToGroup
                Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*
        - PolicyName: ReadMdrApiKey
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/${ServiceName}-post-confirm/MdrApiKey
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm

  PostConfirmationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PostConfirmationLambda
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ---------------------------------------------------------------------------
  # SSM Parameters — consumed by MDR API task definition
  # ---------------------------------------------------------------------------
  UserPoolIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${EnvironmentName}/${ServiceName}/CognitoUserPoolId
      Type: String
      Value: !Ref UserPool
      Description: Cognito User Pool ID for MDR self-serve registration

  SpaClientIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${EnvironmentName}/${ServiceName}/CognitoSpaClientId
      Type: String
      Value: !Ref UserPoolClient
      Description: Cognito SPA Client ID for MDR frontend

  CognitoDomainParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${EnvironmentName}/${ServiceName}/CognitoDomain
      Type: String
      Value: !Sub ${EnvironmentName}-${ServiceName}-selfserve.auth.${AWS::Region}.amazoncognito.com
      Description: Cognito Hosted UI domain for MDR self-serve

Outputs:
  UserPoolId:
    Value: !Ref UserPool
    Description: Cognito User Pool ID
  UserPoolArn:
    Value: !GetAtt UserPool.Arn
    Description: Cognito User Pool ARN
  SpaClientId:
    Value: !Ref UserPoolClient
    Description: SPA Client ID
  CognitoDomain:
    Value: !Sub ${EnvironmentName}-${ServiceName}-selfserve.auth.${AWS::Region}.amazoncognito.com
    Description: Cognito Hosted UI domain
  HostedUiUrl:
    Value: !Sub >-
      https://${EnvironmentName}-${ServiceName}-selfserve.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=code&scope=email+openid+profile&redirect_uri=https://${FrontendDomainName}/auth/callback
    Description: Hosted UI login URL (for reference)
